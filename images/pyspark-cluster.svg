<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 850" style="background-color: #F4F4F4; font-family: monospace, sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#000" />
    </marker>
    <marker id="arrow-down" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 1 0 L 5 10 L 9 0 z" fill="#000" />
    </marker>
  </defs>

  <style>
    /* Static Styles */
    .box-header { fill: #000; stroke: #000; stroke-width: 2; }
    .box-body { fill: #FFF; stroke: #000; stroke-width: 3; }
    .text-header { font-family: sans-serif; font-weight: bold; font-size: 20px; fill: #FFF; text-anchor: middle; }
    .text-body { font-size: 16px; fill: #000; }
    
    /* Animation 1: Marching dashed lines for Control Flow */
    @keyframes flowControl {
      to { stroke-dashoffset: -14; }
    }
    .control-line {
      stroke: #000;
      stroke-width: 2;
      stroke-dasharray: 8 6;
      fill: none;
      animation: flowControl 0.8s linear infinite;
    }

    /* Animation 2: Flowing packets for Data paths */
    @keyframes flowData {
      to { stroke-dashoffset: -30; }
    }
    .data-base {
      stroke: #000;
      stroke-width: 3;
      fill: none;
    }
    .data-flow-mask {
      stroke: #F4F4F4;
      stroke-width: 4.5;
      stroke-dasharray: 10 20;
      fill: none;
      animation: flowData 1s linear infinite;
    }
  </style>

  <text x="30" y="60" font-family="sans-serif" font-weight="bold" font-size="28" fill="#000">APACHE PYSPARK CLUSTER</text>
  <text x="30" y="100" font-size="16" fill="#000">BUNDESLIGA TELEMETRY (25 FPS X,Y TRACKING)</text>
  <line x1="30" y1="120" x2="420" y2="120" stroke="#000" stroke-width="4"/>
  
  <path class="control-line" d="M 730 150 L 730 240 L 460 240 L 460 375" marker-end="url(#arrow-down)" />
  <path class="control-line" d="M 730 240 L 730 375" marker-end="url(#arrow-down)" />
  <path class="control-line" d="M 730 240 L 960 240 L 960 375" marker-end="url(#arrow-down)" />

  <path class="data-base" d="M 280 480 C 320 480, 320 340, 350 340 L 900 340" />
  <path class="data-base" d="M 400 340 L 400 375" marker-end="url(#arrow-down)" />
  <path class="data-base" d="M 650 340 L 650 375" marker-end="url(#arrow-down)" />
  <path class="data-base" d="M 900 340 L 900 375" marker-end="url(#arrow-down)" />

  <path class="data-flow-mask" d="M 280 480 C 320 480, 320 340, 350 340 L 900 340" />
  <path class="data-flow-mask" d="M 400 340 L 400 370" />
  <path class="data-flow-mask" d="M 650 340 L 650 370" />
  <path class="data-flow-mask" d="M 900 340 L 900 370" />

  <path class="data-base" d="M 460 630 L 460 720 L 1050 720 C 1080 720, 1080 500, 1115 500" marker-end="url(#arrow)" />
  <path class="data-base" d="M 730 630 L 730 720" />
  <path class="data-base" d="M 960 630 L 960 720" />

  <path class="data-flow-mask" d="M 460 630 L 460 720 L 1050 720 C 1080 720, 1080 500, 1110 500" />
  <path class="data-flow-mask" d="M 730 630 L 730 720" />
  <path class="data-flow-mask" d="M 960 630 L 960 720" />

  <rect class="box-header" x="480" y="20" width="500" height="50" />
  <text class="text-header" x="730" y="53" font-size="24">SPARK DRIVER NODE</text>
  <rect class="box-body" x="480" y="70" width="500" height="80" />
  <text class="text-body" font-weight="bold" x="560" y="115" text-anchor="middle">DAG Scheduler</text>
  <text class="text-body" font-weight="bold" x="900" y="115" text-anchor="middle">Task Manager</text>

  <rect x="330" y="280" width="760" height="400" fill="none" stroke="#000" stroke-width="2" stroke-dasharray="10 6" />
  <text x="350" y="320" font-family="sans-serif" font-weight="bold" font-size="20" fill="#000">CLUSTER RESOURCES (EXECUTORS)</text>

  <rect class="box-header" x="360" y="380" width="200" height="50" />
  <text class="text-header" x="460" y="413">WORKER 1</text>
  <rect class="box-body" x="360" y="430" width="200" height="200" />
  <text class="text-body" x="390" y="480">Partition 1</text>
  <text class="text-body" x="390" y="530">Map: Velocity</text>

  <rect class="box-header" x="610" y="380" width="200" height="50" />
  <text class="text-header" x="710" y="413">WORKER 2</text>
  <rect class="box-body" x="610" y="430" width="200" height="200" />
  <text class="text-body" x="640" y="480">Partition 2</text>
  <text class="text-body" x="640" y="530">Map: Distance</text>

  <rect class="box-header" x="860" y="380" width="200" height="50" />
  <text class="text-header" x="960" y="413">WORKER 3</text>
  <rect class="box-body" x="860" y="430" width="200" height="200" />
  <text class="text-body" x="890" y="480">Partition 3</text>
  <text class="text-body" x="890" y="530">Map: Heatmaps</text>

  <rect class="box-header" x="20" y="380" width="260" height="50" />
  <text class="text-header" x="150" y="415" font-size="22">INGESTION</text>
  <rect class="box-body" x="20" y="430" width="260" height="150" />
  <text class="text-body" x="45" y="480">Tracking JSON</text>
  <text class="text-body" x="45" y="530">22 Players + Ball</text>

  <rect class="box-header" x="1120" y="330" width="260" height="50" />
  <text class="text-header" x="1250" y="364" font-size="22">REDUCE / KPIS</text>
  <rect class="box-body" x="1120" y="380" width="260" height="250" />
  <text class="text-body" x="1145" y="430">Advanced Metrics:</text>
  <text class="text-body" x="1145" y="480">1. High-Speed Runs</text>
  <text class="text-body" x="1145" y="530">2. Team Centroid</text>
  <text class="text-body" x="1145" y="580">3. Pass Networks</text>
</svg>
