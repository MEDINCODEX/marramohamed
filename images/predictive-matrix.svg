<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="100%" height="100%">
  <style>
    .text-title { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 14px; fill: #050505; text-transform: uppercase; letter-spacing: 0.15em; }
    .text-metric { font-family: 'Inter', sans-serif; font-weight: 900; font-size: 36px; fill: #050505; letter-spacing: -0.02em; }
    .text-body { font-family: monospace; font-size: 11px; fill: #555555; letter-spacing: 0.05em; text-transform: uppercase; }
    .text-number { font-family: monospace; font-size: 24px; font-weight: bold; fill: #050505; }
    .text-white { fill: #F4F4F4; }
    .box { fill: transparent; stroke: #050505; stroke-width: 1.5; }
    .box-filled { fill: #050505; }
    .box-light { fill: rgba(5, 5, 5, 0.05); stroke: #050505; stroke-width: 1; }
    .line { stroke: #050505; stroke-width: 1; stroke-dasharray: 4 4; }
  </style>

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none" stroke="#050505" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="1000" height="400" fill="url(#grid)" />

  <rect x="40" y="40" width="300" height="30" class="box-filled" />
  <text x="50" y="60" class="text-title text-white">WAZE_CHURN_MODEL_V2</text>
  <text x="360" y="60" class="text-body" fill="#050505">STATUS: OPTIMIZED | ENGINE: SCIKIT-LEARN</text>

  <text x="40" y="120" class="text-title">CONFUSION MATRIX (TEST DATA)</text>
  
  <text x="90" y="150" class="text-body" transform="rotate(-90 90,150)">ACTUAL CLASS</text>
  <text x="210" y="140" class="text-body">PREDICTED CLASS</text>

  <rect x="120" y="160" width="140" height="100" class="box-filled" /> <text x="140" y="200" class="text-title text-white">RETAINED</text>
  <text x="140" y="235" class="text-number text-white">8,452</text>
  <text x="235" y="180" class="text-body text-white">TN</text>

  <rect x="260" y="160" width="140" height="100" class="box-light" /> <text x="280" y="200" class="text-title" opacity="0.5">CHURNED</text>
  <text x="280" y="235" class="text-number">1,104</text>
  <text x="375" y="180" class="text-body">FP</text>

  <rect x="120" y="260" width="140" height="100" class="box-light" /> <text x="140" y="300" class="text-title" opacity="0.5">RETAINED</text>
  <text x="140" y="335" class="text-number">943</text>
  <text x="235" y="280" class="text-body">FN</text>

  <rect x="260" y="260" width="140" height="100" class="box" /> <text x="280" y="300" class="text-title">CHURNED</text>
  <text x="280" y="335" class="text-number">2,311</text>
  <text x="375" y="280" class="text-body">TP</text>

  <line x1="480" y1="120" x2="480" y2="360" class="line" />

  <text x="540" y="120" class="text-title">PERFORMANCE METRICS (MACRO AVG)</text>

  <rect x="540" y="160" width="180" height="90" class="box" />
  <text x="560" y="190" class="text-body">ROC-AUC SCORE</text>
  <text x="560" y="230" class="text-metric">0.894</text>

  <rect x="740" y="160" width="180" height="90" class="box" />
  <text x="760" y="190" class="text-body">F1-SCORE (CHURN)</text>
  <text x="760" y="230" class="text-metric">0.821</text>

  <rect x="540" y="270" width="180" height="90" class="box" />
  <text x="560" y="300" class="text-body">PRECISION</text>
  <text x="560" y="340" class="text-metric">0.840</text>

  <rect x="740" y="270" width="180" height="90" class="box" />
  <text x="760" y="300" class="text-body">RECALL</text>
  <text x="760" y="340" class="text-metric">0.795</text>

</svg>
